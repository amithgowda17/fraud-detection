<!doctype html>
<html>
  <head>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #2a5298;
      }
      .box {
        background: white;
        padding: 30px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Login</h2>
      <form method="post">
        <input name="username" placeholder="Username" /><br />
        <input type="password" name="password" placeholder="Password" /><br />
        <button>Login</button>
      </form>
    </div>
  </body>
</html>
