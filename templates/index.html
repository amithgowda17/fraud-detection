<!doctype html>
<html>
  <head>
    <title>Fraud Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Segoe UI;
      }

      .sidebar {
        width: 240px;
        background: #0f172a;
        color: white;
        height: 100vh;
        position: fixed;
        padding: 20px;
      }

      .sidebar a {
        display: block;
        padding: 10px;
        color: white;
        text-decoration: none;
      }

      .sidebar a:hover {
        background: #1e293b;
      }

      .main {
        margin-left: 260px;
        padding: 20px;
        background: #f1f5f9;
      }

      .cards {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .card {
        flex: 1;
        min-width: 120px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
      }

      .form-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-top: 20px;
      }

      input {
        width: 95%;
        padding: 10px;
        margin: 5px;
      }

      button {
        padding: 10px;
        background: #2563eb;
        color: white;
        border: none;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>💳 FraudSys</h2>
      <a href="/">Detection</a>
      <a href="/insights">Insights</a>
      <a href="/about">About</a>
      <hr />
      <a href="/download_report">Download Report</a>
      <a href="/logout">Logout</a>
    </div>

    <div class="main">
      <div class="cards">
        <div class="card">Total {{total}}</div>
        <div class="card">Fraud {{fraud}}</div>
        <div class="card">Safe {{safe}}</div>
        <div class="card">{{percent}}%</div>
      </div>

      <div class="form-box">
        <form method="post" action="/predict_ui">
          <input name="amount" placeholder="Amount" required />
          <input name="time" placeholder="Time" required />
          <input name="location" placeholder="Location" required />
          <input name="device" placeholder="Device" required />
          <input name="history" placeholder="History" required />
          <button>Analyze</button>
        </form>

        {% if result %}
        <p>{{result}}</p>
        <p>{{explanation}}</p>
        {% endif %}
      </div>
    </div>
  </body>
</html>
