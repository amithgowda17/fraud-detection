<!doctype html>
<html>
  <head>
    <title>Fraud Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Segoe UI;
      }

      /* SIDEBAR */
      .sidebar {
        width: 240px;
        background: #0f172a;
        color: white;
        height: 100vh;
        position: fixed;
        padding: 20px;
      }

      .sidebar a {
        display: block;
        padding: 10px;
        color: white;
        text-decoration: none;
      }

      .sidebar a:hover {
        background: #1e293b;
      }

      /* MAIN */
      .main {
        margin-left: 260px;
        padding: 20px;
        background: #f1f5f9;
      }

      /* CARDS */
      .cards {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .card {
        flex: 1;
        min-width: 120px;
        background: white;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
      }

      /* FORM */
      .form-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        margin-top: 20px;
      }

      input {
        width: 95%;
        padding: 10px;
        margin: 5px;
      }

      button {
        padding: 10px;
        background: #2563eb;
        color: white;
        border: none;
      }

      /* CHART GRID */
      .chart-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .chart-card {
        background: white;
        padding: 15px;
        border-radius: 10px;
      }

      .chart-card.full {
        grid-column: span 2;
      }

      canvas {
        max-height: 250px !important;
      }

      .section {
        display: none;
      }
      .active {
        display: block;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>💳 FraudSys</h2>

      <a onclick="show('detect')">Detection</a>
      <a onclick="show('insights')">Insights</a>
      <a onclick="show('about')">About</a>

      <hr />

      <a href="/download_report">Download Report</a>
      <a href="/logout">Logout</a>
    </div>

    <div class="main">
      <div class="cards">
        <div class="card">Total {{total}}</div>
        <div class="card">Fraud {{fraud}}</div>
        <div class="card">Safe {{safe}}</div>
        <div class="card">{{percent}}%</div>
      </div>

      <!-- DETECT -->
      <div id="detect" class="section active">
        <div class="form-box">
          <form method="post" action="/predict_ui">
            <input name="amount" placeholder="Amount" required />
            <input name="time" placeholder="Time" required />
            <input name="location" placeholder="Location" required />
            <input name="device" placeholder="Device" required />
            <input name="history" placeholder="History" required />
            <button>Analyze</button>
          </form>

          {% if result %}
          <p>{{result}}</p>
          <p>{{explanation}}</p>
          {% endif %}
        </div>
      </div>

      <!-- INSIGHTS -->
      <div id="insights" class="section">
        <div class="chart-grid">
          <div class="chart-card">
            <canvas id="pie"></canvas>
          </div>

          <div class="chart-card">
            <canvas id="bar"></canvas>
          </div>

          <div class="chart-card full">
            <canvas id="line"></canvas>
          </div>
        </div>
      </div>

      <!-- ABOUT -->
      <div id="about" class="section">
        <h3>About</h3>
        <p>
          This system detects fraud using machine learning and behavioral
          analytics.
        </p>
      </div>
    </div>

    <script>
      function show(id) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      const fraud = parseInt("{{fraud}}") || 0;
      const safe = parseInt("{{safe}}") || 0;

      new Chart(document.getElementById("pie"), {
        type: "doughnut",
        data: {
          labels: ["Fraud", "Safe"],
          datasets: [{ data: [fraud, safe] }],
        },
        options: { responsive: true, maintainAspectRatio: false },
      });

      new Chart(document.getElementById("bar"), {
        type: "bar",
        data: {
          labels: ["Fraud", "Safe"],
          datasets: [{ data: [fraud, safe] }],
        },
        options: { responsive: true, maintainAspectRatio: false },
      });

      new Chart(document.getElementById("line"), {
        type: "line",
        data: {
          labels: ["Start", "Mid", "Now"],
          datasets: [{ data: [0, (fraud + safe) / 2, fraud + safe] }],
        },
        options: { responsive: true, maintainAspectRatio: false },
      });
    </script>
  </body>
</html>
