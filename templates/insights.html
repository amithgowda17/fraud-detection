<!doctype html>
<html>
  <head>
    <title>Insights</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Segoe UI;
      }

      .sidebar {
        width: 240px;
        background: #0f172a;
        color: white;
        height: 100vh;
        position: fixed;
        padding: 20px;
      }

      .sidebar a {
        display: block;
        padding: 10px;
        color: white;
        text-decoration: none;
      }

      .sidebar a:hover {
        background: #1e293b;
      }

      .main {
        margin-left: 260px;
        padding: 20px;
        background: #f1f5f9;
      }

      .chart-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .chart-card {
        background: white;
        padding: 15px;
        border-radius: 10px;
      }

      .chart-card.full {
        grid-column: span 2;
      }

      canvas {
        max-height: 250px !important;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>💳 FraudSys</h2>
      <a href="/">Detection</a>
      <a href="/insights">Insights</a>
      <a href="/about">About</a>
      <hr />
      <a href="/download_report">Download Report</a>
      <a href="/logout">Logout</a>
    </div>

    <div class="main">
      <h2>📊 Insights Dashboard</h2>

      <div class="chart-grid">
        <div class="chart-card"><canvas id="pie"></canvas></div>
        <div class="chart-card"><canvas id="bar"></canvas></div>
        <div class="chart-card full"><canvas id="line"></canvas></div>
      </div>
    </div>

    <script>
      const fraud = parseInt("{{ fraud | default(0) }}");
      const safe = parseInt("{{ safe | default(0) }}");

      new Chart(document.getElementById("pie"), {
        type: "doughnut",
        data: {
          labels: ["Fraud", "Safe"],
          datasets: [{ data: [fraud, safe] }],
        },
      });

      new Chart(document.getElementById("bar"), {
        type: "bar",
        data: {
          labels: ["Fraud", "Safe"],
          datasets: [{ data: [fraud, safe] }],
        },
      });

      new Chart(document.getElementById("line"), {
        type: "line",
        data: {
          labels: ["Start", "Mid", "Now"],
          datasets: [{ data: [0, (fraud + safe) / 2, fraud + safe] }],
        },
      });
    </script>
  </body>
</html>
